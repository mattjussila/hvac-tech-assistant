                                                                    <h3 className="text-xs font-bold text-emerald-600 mb-3 border-b pb-1">Discharge (Hot Gas)</h3>
                                                                    <div className="grid grid-cols-2 gap-4">
                                                                        <NumInput label="Saturation Temp (DSAT)" name={`dischargeSatTemp${suffix}`} placeholder="110" unit={tempUnit} unitType="temp" isMetric={isMetric} disabled={isNonOp} value={data[`dischargeSatTemp${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        <NumInput label="Discharge Line Temp" name={`dischargeLineTemp${suffix}`} placeholder="160" unit={tempUnit} unitType="temp" isMetric={isMetric} disabled={isNonOp} value={data[`dischargeLineTemp${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </>
                                            )}
                                        </section>
                                    )}

                                    {!isMiniSplit && hasAnyUnitSelected && (
                                        <section className="bg-amber-50/50 border border-amber-100 rounded-xl p-4 shadow-sm">
                                            <h2 className="text-sm font-bold text-amber-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                                                <Zap className="w-4 h-4 text-amber-500" /> Electrical Data
                                            </h2>
                                            
                                            <div className="space-y-6">
                                                {/* OUTDOOR / PACKAGE ELECTRICAL */}
                                                {hasOutdoorUnit && (
                                                    <div className="space-y-3">
                                                        <h3 className="text-xs font-black text-amber-700 uppercase tracking-widest border-b border-amber-200 pb-1">
                                                            {isPackageUnit ? 'Package Unit Electrical' : 'Outdoor Electrical'}
                                                        </h3>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            
                                                            {/* Outdoor Voltage */}
                                                            <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm">
                                                                <div className="flex items-center justify-between mb-2">
                                                                    <h4 className="text-[10px] font-bold text-amber-600 uppercase">Voltage</h4>
                                                                    <select 
                                                                        name="outdoorPhase" 
                                                                        value={data.outdoorPhase || '1'} 
                                                                        onChange={(e) => handleStandardNumChange('outdoorPhase', e.target.value)} 
                                                                        disabled={isNonOp} 
                                                                        className={`text-[10px] font-bold text-amber-600 bg-amber-50 border border-amber-100 rounded px-2 py-0.5 outline-none cursor-pointer ${isNonOp ? 'opacity-50' : ''}`}
                                                                    >
                                                                        <option value="1">1-Phase</option>
                                                                        <option value="3">3-Phase</option>
                                                                    </select>
                                                                </div>
                                                                <div className="space-y-2">
                                                                    {data.outdoorPhase === '3' ? (
                                                                        <>
                                                                            <div className="grid grid-cols-3 gap-2">
                                                                                <NumInput label="L1-L2" name="outdoorVoltageL1L2" placeholder="480" unit="V" disabled={isNonOp} value={data.outdoorVoltageL1L2} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <NumInput label="L1-L3" name="outdoorVoltageL1L3" placeholder="480" unit="V" disabled={isNonOp} value={data.outdoorVoltageL1L3} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <NumInput label="L2-L3" name="outdoorVoltageL2L3" placeholder="480" unit="V" disabled={isNonOp} value={data.outdoorVoltageL2L3} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            </div>
                                                                            <div className="grid grid-cols-3 gap-2">
                                                                                <NumInput label="L1-GND" name="outdoorVoltageL1GND" placeholder="277" unit="V" disabled={isNonOp} value={data.outdoorVoltageL1GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <NumInput label="L2-GND" name="outdoorVoltageL2GND" placeholder="277" unit="V" disabled={isNonOp} value={data.outdoorVoltageL2GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <NumInput label="L3-GND" name="outdoorVoltageL3GND" placeholder="277" unit="V" disabled={isNonOp} value={data.outdoorVoltageL3GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            </div>
                                                                        </>
                                                                    ) : (
                                                                        <>
                                                                            <NumInput label="L1 to L2" name="outdoorVoltageL1L2" placeholder="240" unit="V" disabled={isNonOp} value={data.outdoorVoltageL1L2} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <div className="grid grid-cols-2 gap-2">
                                                                                <NumInput label="L1 to GND" name="outdoorVoltageL1GND" placeholder="120" unit="V" disabled={isNonOp} value={data.outdoorVoltageL1GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <NumInput label="L2 to GND" name="outdoorVoltageL2GND" placeholder="120" unit="V" disabled={isNonOp} value={data.outdoorVoltageL2GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            </div>
                                                                        </>
                                                                    )}
                                                                    {isPackageUnit && <NumInput label="Control Voltage (Secondary)" name="controlVoltage" placeholder="24" unit="V" disabled={isNonOp} value={data.controlVoltage} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />}
                                                                </div>
                                                            </div>

                                                            {/* Outdoor Motors */}
                                                            <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm">
                                                                <h4 className="text-[10px] font-bold text-amber-600 uppercase mb-2">Motors</h4>
                                                                <div className="space-y-2">
                                                                    {showOutdoorElectrical && (
                                                                        <>
                                                                            {['', '2'].slice(0, parseInt(data.numberOfCompressors) || 1).map((suffix, idx) => (
                                                                                <NumInput key={`compAmp-${idx}`} label={`Compressor ${parseInt(data.numberOfCompressors) > 1 ? idx + 1 + ' ' : ''}Amps`} name={`compressorAmps${suffix}`} placeholder="12.5" unit="A" disabled={isNonOp} value={data[`compressorAmps${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            ))}
                                                                            <NumInput label="OD Fan Amps" name="fanAmps" placeholder="1.2" unit="A" disabled={isNonOp} value={data.fanAmps} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        </>
                                                                    )}
                                                                    {isPackageUnit && (
                                                                        <NumInput label="ID Blower Amps" name="blowerAmps" placeholder="2.8" unit="A" disabled={isNonOp} value={data.blowerAmps} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                    )}
                                                                    {(!showOutdoorElectrical && !isPackageUnit) && (
                                                                        <div className="text-xs text-gray-400 italic py-2">Motors inactive in current mode.</div>
                                                                    )}
                                                                </div>
                                                            </div>

                                                            {/* Outdoor Capacitors */}
                                                            {['', '2'].slice(0, parseInt(data.numberOfCompressors) || 1).map((suffix, idx) => (
                                                                <div key={`cap-${idx}`} className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm md:col-span-2">
                                                                    <h4 className="text-[10px] font-bold text-amber-600 uppercase mb-3 border-b border-amber-50 pb-1">
                                                                        {isPackageUnit ? 'Compressor & Fan Capacitor' : 'Outdoor Capacitor'} {parseInt(data.numberOfCompressors) > 1 ? `(Comp ${idx + 1})` : ''}
                                                                    </h4>
                                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-4">
                                                                        <SelectInput 
                                                                            label="Capacitor Configuration" 
                                                                            name={`oduCapType${suffix}`} 
                                                                            options={[{val:'Dual',label:'Dual Run'},{val:'Single',label:'Single Run / Separate'}]} 
                                                                            disabled={isNonOp} 
                                                                            value={data[`oduCapType${suffix}`]} onChangeText={handleStandardNumChange}
                                                                        />
                                                                    </div>
                                                                    {data[`oduCapType${suffix}`] === 'Dual' && (
                                                                        <div className="grid grid-cols-2 gap-x-4 gap-y-2 animate-in fade-in duration-200">
                                                                            <div className="col-span-2 border-b border-gray-100 pb-1 mt-2">
                                                                                <span className="text-[10px] font-bold text-gray-500 uppercase">Herm (Compressor)</span>
                                                                            </div>
                                                                            <NumInput label="Rated (µF)" name={`oduCapHermRated${suffix}`} placeholder="45" unit="µF" disabled={isNonOp} value={data[`oduCapHermRated${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <div>
                                                                                <NumInput label="Actual (µF)" name={`oduCapHermActual${suffix}`} placeholder="43.2" unit="µF" disabled={isNonOp} value={data[`oduCapHermActual${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <CapacitorCheck rated={data[`oduCapHermRated${suffix}`]} actual={data[`oduCapHermActual${suffix}`]} />
                                                                            </div>
                                                                            
                                                                            <div className="col-span-2 border-b border-gray-100 pb-1 mt-2">
                                                                                <span className="text-[10px] font-bold text-gray-500 uppercase">Fan</span>
                                                                            </div>
                                                                            <NumInput label="Rated (µF)" name={`oduCapFanRated${suffix}`} placeholder="5.0" unit="µF" disabled={isNonOp} value={data[`oduCapFanRated${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <div>
                                                                                <NumInput label="Actual (µF)" name={`oduCapFanActual${suffix}`} placeholder="4.9" unit="µF" disabled={isNonOp} value={data[`oduCapFanActual${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <CapacitorCheck rated={data[`oduCapFanRated${suffix}`]} actual={data[`oduCapFanActual${suffix}`]} />
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                    {data[`oduCapType${suffix}`] === 'Single' && (
                                                                        <div className="grid grid-cols-2 gap-x-4 gap-y-2 animate-in fade-in duration-200">
                                                                            <div className="col-span-2 border-b border-gray-100 pb-1 mt-2">
                                                                                <span className="text-[10px] font-bold text-gray-500 uppercase">Compressor</span>
                                                                            </div>
                                                                            <NumInput label="Rated (µF)" name={`oduCapCompRated${suffix}`} placeholder="45" unit="µF" disabled={isNonOp} value={data[`oduCapCompRated${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <div>
                                                                                <NumInput label="Actual (µF)" name={`oduCapCompActual${suffix}`} placeholder="44" unit="µF" disabled={isNonOp} value={data[`oduCapCompActual${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <CapacitorCheck rated={data[`oduCapCompRated${suffix}`]} actual={data[`oduCapCompActual${suffix}`]} />
                                                                            </div>
                                                                            
                                                                            <div className="col-span-2 flex items-center justify-between border-b border-gray-100 pb-1 mt-2">
                                                                                <span className="text-[10px] font-bold text-gray-500 uppercase">Fan Capacitor</span>
                                                                                <label className="flex items-center gap-1 cursor-pointer">
                                                                                    <input type="checkbox" name={`oduFanECM${suffix}`} checked={data[`oduFanECM${suffix}`]} onChange={handleCheckboxChange} disabled={isNonOp} className="w-3 h-3 accent-amber-600" />
                                                                                    <span className="text-[8px] font-bold text-gray-400 uppercase leading-none">ECM</span>
                                                                                </label>
                                                                            </div>
                                                                            {!data[`oduFanECM${suffix}`] && (
                                                                                <>
                                                                                    <NumInput label="Rated (µF)" name={`oduCapFanRated${suffix}`} placeholder="5.0" unit="µF" disabled={isNonOp} value={data[`oduCapFanRated${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                    <div>
                                                                                        <NumInput label="Actual (µF)" name={`oduCapFanActual${suffix}`} placeholder="4.9" unit="µF" disabled={isNonOp} value={data[`oduCapFanActual${suffix}`]} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                        <CapacitorCheck rated={data[`oduCapFanRated${suffix}`]} actual={data[`oduCapFanActual${suffix}`]} />
                                                                                    </div>
                                                                                </>
                                                                            )}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}

                                                        {/* Package Unit Specifics (Indoor Cap & Aux Heat) */}
                                                        {isPackageUnit && (
                                                            <>
                                                                <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm md:col-span-1 mt-4">
                                                                    <div className="flex items-center justify-between border-b border-amber-50 mb-3 pb-1">
                                                                        <h4 className="text-[10px] font-bold text-amber-600 uppercase">Blower Run Capacitor</h4>
                                                                        <label className="flex items-center gap-1.5 cursor-pointer">
                                                                            <input type="checkbox" name="indoorECM" checked={data.indoorECM} onChange={handleCheckboxChange} disabled={isNonOp} className="w-3.5 h-3.5 accent-amber-600" />
                                                                            <span className="text-[10px] font-bold text-gray-500 uppercase">ECM Motor</span>
                                                                        </label>
                                                                    </div>
                                                                    {!data.indoorECM && (
                                                                        <div className="grid grid-cols-2 gap-2">
                                                                            <NumInput label="Rated (µF)" name="indoorCapRated" placeholder="5.0" unit="µF" disabled={isNonOp} value={data.indoorCapRated} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <div>
                                                                                <NumInput label="Actual (µF)" name="indoorCapActual" placeholder="4.8" unit="µF" disabled={isNonOp} value={data.indoorCapActual} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                                <CapacitorCheck rated={data.indoorCapRated} actual={data.indoorCapActual} />
                                                                            </div>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                                {isAuxAvailable && (
                                                                    <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm md:col-span-1 mt-4 animate-in fade-in duration-200">
                                                                        <h4 className="text-[10px] font-bold text-amber-600 uppercase mb-3 border-b border-amber-50 pb-1">Aux / Electric Heat</h4>
                                                                        <div className="space-y-2">
                                                                            <NumInput label="Heater Kit Amps" name="heaterKitAmps" placeholder="20" unit="A" disabled={isNonOp} value={data.heaterKitAmps} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <NumInput label="Heater Kit Voltage" name="heaterKitVoltage" placeholder="240" unit="V" disabled={isNonOp} value={data.heaterKitVoltage} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        </div>
                                                                    </div>
                                                                )}
                                                            </>
                                                        )}
                                                        </div>
                                                    </div>
                                                )}

                                            {/* INDOOR ELECTRICAL */}
                                            {!isPackageUnit && data.indoorUnitType !== '' && (
                                                <div className="space-y-3 pt-2">
                                                    <h3 className="text-xs font-black text-amber-700 uppercase tracking-widest border-b border-amber-200 pb-1">
                                                        Indoor Electrical
                                                    </h3>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        
                                                        {/* Indoor Voltage */}
                                                        <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm">
                                                            <div className="flex items-center justify-between mb-2">
                                                                <h4 className="text-[10px] font-bold text-amber-600 uppercase">Voltage</h4>
                                                                <select 
                                                                    name="indoorPhase" 
                                                                    value={data.indoorPhase || '1'} 
                                                                    onChange={(e) => handleStandardNumChange('indoorPhase', e.target.value)} 
                                                                    disabled={isNonOp} 
                                                                    className={`text-[10px] font-bold text-amber-600 bg-amber-50 border border-amber-100 rounded px-2 py-0.5 outline-none cursor-pointer ${isNonOp ? 'opacity-50' : ''}`}
                                                                >
                                                                    <option value="1">1-Phase</option>
                                                                    <option value="3">3-Phase</option>
                                                                </select>
                                                            </div>
                                                            <div className="space-y-2">
                                                                {data.indoorPhase === '3' ? (
                                                                    <>
                                                                        <div className="grid grid-cols-3 gap-2">
                                                                            <NumInput label="L1-L2" name="indoorVoltageL1L2" placeholder="480" unit="V" disabled={isNonOp} value={data.indoorVoltageL1L2} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <NumInput label="L1-L3" name="indoorVoltageL1L3" placeholder="480" unit="V" disabled={isNonOp} value={data.indoorVoltageL1L3} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <NumInput label="L2-L3" name="indoorVoltageL2L3" placeholder="480" unit="V" disabled={isNonOp} value={data.indoorVoltageL2L3} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        </div>
                                                                        <div className="grid grid-cols-3 gap-2">
                                                                            <NumInput label="L1-GND" name="indoorVoltageL1GND" placeholder="277" unit="V" disabled={isNonOp} value={data.indoorVoltageL1GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <NumInput label="L2-GND" name="indoorVoltageL2GND" placeholder="277" unit="V" disabled={isNonOp} value={data.indoorVoltageL2GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <NumInput label="L3-GND" name="indoorVoltageL3GND" placeholder="277" unit="V" disabled={isNonOp} value={data.indoorVoltageL3GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        </div>
                                                                    </>
                                                                ) : (
                                                                    <>
                                                                        <NumInput label="L1 to L2/N" name="indoorVoltageL1L2" placeholder={data.indoorUnitType === 'Gas Furnace' ? "120" : "240"} unit="V" disabled={isNonOp} value={data.indoorVoltageL1L2} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        <div className="grid grid-cols-2 gap-2">
                                                                            <NumInput label="L1 to GND" name="indoorVoltageL1GND" placeholder="120" unit="V" disabled={isNonOp} value={data.indoorVoltageL1GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                            <NumInput label="L2/N to GND" name="indoorVoltageL2GND" placeholder="0" unit="V" disabled={isNonOp} value={data.indoorVoltageL2GND} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        </div>
                                                                    </>
                                                                )}
                                                                <NumInput label="Control Voltage (Secondary)" name="controlVoltage" placeholder="24" unit="V" disabled={isNonOp} value={data.controlVoltage} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                            </div>
                                                        </div>

                                                        {/* Indoor Motors */}
                                                        <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm">
                                                            <h4 className="text-[10px] font-bold text-amber-600 uppercase mb-2">Motors</h4>
                                                            <div className="space-y-2">
                                                                <NumInput label="ID Blower Amps" name="blowerAmps" placeholder="2.8" unit="A" disabled={isNonOp} value={data.blowerAmps} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                            </div>
                                                        </div>

                                                        {/* Indoor Capacitors */}
                                                        <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm">
                                                            <div className="flex items-center justify-between border-b border-amber-50 mb-3 pb-1">
                                                                <h4 className="text-[10px] font-bold text-amber-600 uppercase">Indoor Capacitor</h4>
                                                                <label className="flex items-center gap-1.5 cursor-pointer">
                                                                    <input type="checkbox" name="indoorECM" checked={data.indoorECM} onChange={handleCheckboxChange} disabled={isNonOp} className="w-3.5 h-3.5 accent-amber-600" />
                                                                    <span className="text-[10px] font-bold text-gray-500 uppercase">ECM Motor</span>
                                                                </label>
                                                            </div>
                                                            {!data.indoorECM && (
                                                                <div className="grid grid-cols-2 gap-2">
                                                                    <NumInput label="Rated (µF)" name="indoorCapRated" placeholder="5.0" unit="µF" disabled={isNonOp} value={data.indoorCapRated} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                    <div>
                                                                        <NumInput label="Actual (µF)" name="indoorCapActual" placeholder="4.8" unit="µF" disabled={isNonOp} value={data.indoorCapActual} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                        <CapacitorCheck rated={data.indoorCapRated} actual={data.indoorCapActual} />
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>

                                                        {/* Indoor Aux Heat */}
                                                        {isAuxAvailable && (
                                                            <div className="p-3 bg-white rounded-lg border border-amber-100 shadow-sm animate-in fade-in duration-200">
                                                                <h4 className="text-[10px] font-bold text-amber-600 uppercase mb-3 border-b border-amber-50 pb-1">Aux / Electric Heat</h4>
                                                                <div className="space-y-2">
                                                                    <NumInput label="Heater Kit Amps" name="heaterKitAmps" placeholder="20" unit="A" disabled={isNonOp} value={data.heaterKitAmps} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                    <NumInput label="Heater Kit Voltage" name="heaterKitVoltage" placeholder="240" unit="V" disabled={isNonOp} value={data.heaterKitVoltage} onChangeText={handleStandardNumChange} isNonOp={isNonOp} />
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </section>
                                    )}

                                    <section className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
                                        <h2 className="text-sm font-bold text-gray-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                                            <FileText className="w-4 h-4 text-gray-400" /> Additional Service Notes
                                        </h2>
                                        <textarea
                                            name="notes"
                                            value={data.notes || ''}
                                            onChange={(e) => handleStandardNumChange('notes', e.target.value)}
                                            placeholder="Enter any visual observations, parts needed, or summary of work done..."
                                            className="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 min-h-[120px] resize-none"
                                        ></textarea>
                                    </section>
                                    
                                    {/* Persistent FAB for Data Copy */}
                                    <div className="sticky bottom-4 pt-4 mt-8 z-40">
                                        <button
                                            onClick={handleCopy}
                                            className={`w-full py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl transition-all flex justify-center items-center gap-3 active:scale-[0.98] ${copied ? 'bg-green-500 shadow-green-200 text-white' : 'bg-blue-600 shadow-blue-200 text-white'}`}
                                        >
                                            {copied ? (
                                                <><CheckCircle2 className="w-5 h-5" /> Data Copied!</>
                                            ) : (
                                                <><ClipboardCopy className="w-5 h-5" /> Quick Copy Data</>
                                            )}
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* TAB 2: EXPORT */}
                            {activeTab === 'export' && (
                                <div className="space-y-4 flex flex-col h-full animate-in fade-in duration-300">
                                    <div className="flex flex-col mb-2">
                                        <div className="flex items-center justify-between mb-4">
                                            <label className="text-sm font-semibold text-gray-700">Export Formatting</label>
                                        </div>
                                        
                                        <div className="flex bg-gray-100 rounded-lg p-1 mb-4 shadow-inner">
                                            <button onClick={() => setExportFormat('text')} className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${exportFormat === 'text' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>Standard Text</button>
                                            <button onClick={() => setExportFormat('markdown')} className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${exportFormat === 'markdown' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>Markdown</button>
                                            <button onClick={() => setExportFormat('json')} className={`flex-1 py-2 text-xs font-bold rounded-md transition-all ${exportFormat === 'json' ? 'bg-white shadow text-blue-600' : 'text-gray-500 hover:text-gray-700'}`}>JSON Payload</button>
                                        </div>
                                    </div>

                                    <div className="relative flex-grow min-h-[300px]">
                                        <div className="absolute inset-0 bg-slate-800 rounded-xl p-4 overflow-auto shadow-inner">
                                            <pre className="text-green-400 font-mono text-xs sm:text-sm whitespace-pre-wrap">{generateExportContent()}</pre>
                                        </div>
                                        <div className="opacity-0 pointer-events-none p-4 whitespace-pre-wrap font-mono text-xs sm:text-sm">{generateExportContent()}</div>
                                    </div>

                                    <button
                                        onClick={handleCopy}
                                        className={`w-full py-4 rounded-xl font-bold transition-all flex justify-center items-center gap-2 ${copied ? 'bg-green-500 text-white shadow-lg' : 'bg-blue-600 text-white shadow-lg active:scale-[0.98]'}`}
                                    >
                                        {copied ? (
                                            <><CheckCircle2 className="w-5 h-5" /> Copied to Clipboard!</>
                                        ) : (
                                            <><ClipboardCopy className="w-5 h-5" /> Copy Data to Clipboard</>
                                        )}
                                    </button>
                                </div>
                            )}

                            {/* TAB 3: HISTORY */}
                            {activeTab === 'history' && (
                                <div className="space-y-4 animate-in fade-in duration-300">
                                    <div className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
                                        <h2 className="text-sm font-bold text-gray-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                                            <Archive className="w-4 h-4 text-blue-500" /> Saved Sessions Archive
                                        </h2>
                                        
                                        {savedJobs.length === 0 ? (
                                            <div className="text-center py-8 bg-gray-50 rounded-lg border border-dashed border-gray-200">
                                                <p className="text-sm text-gray-500 italic">No saved jobs found in the local archive.</p>
                                            </div>
                                        ) : (
                                            <div className="space-y-3">
                                                {savedJobs.map(job => (
                                                    <div key={job.id} className={`p-4 border rounded-xl flex items-center justify-between transition-colors ${data.id === job.id ? 'border-blue-400 bg-blue-50/50 shadow-sm' : 'border-gray-200 bg-gray-50 hover:bg-gray-100'}`}>
                                                        <div className="flex flex-col">
                                                            <h3 className="font-bold text-gray-800">{job.jobName || 'Untitled Job'}</h3>
                                                            <p className="text-xs text-gray-500 mt-0.5">Last modified: {new Date(job.lastModified).toLocaleString()}</p>
                                                            <div className="flex flex-wrap gap-2 mt-2">
                                                                {job.outdoorUnitType && <span className="text-[10px] font-bold bg-gray-200 px-2 py-0.5 rounded text-gray-600 uppercase tracking-wider">{job.outdoorUnitType}</span>}
                                                                {job.operationalMode && <span className="text-[10px] font-bold bg-blue-100 px-2 py-0.5 rounded text-blue-600 uppercase tracking-wider">{job.operationalMode}</span>}
                                                            </div>
                                                        </div>
                                                        <div className="flex flex-col gap-2 shrink-0">
                                                            {data.id !== job.id && (
                                                                <button 
                                                                    onClick={() => loadJob(job)} 
                                                                    className="px-4 py-1.5 bg-blue-600 text-white hover:bg-blue-700 rounded-lg text-xs font-bold transition-colors shadow-sm"
                                                                >
                                                                    Load Data
                                                                </button>
                                                            )}
                                                            <button 
                                                                onClick={() => deleteJob(job.id)} 
                                                                className="px-4 py-1.5 text-gray-500 bg-gray-200 hover:text-white hover:bg-red-600 rounded-lg text-xs font-bold transition-colors flex items-center justify-center gap-1"
                                                            >
                                                                <Trash2 className="w-3 h-3" /> Delete
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HvacTroubleshooter />);
    </script>
</body>
</html>
