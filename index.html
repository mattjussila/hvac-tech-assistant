<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents zooming when tapping inputs on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVAC Tech Assistant - TryTryAgain</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load React -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Load Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- INLINE ICONS ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ClipboardCopy = ({ className }) => <Icon className={className}><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2h-6"/><path d="m9 14 2 2 4-4"/></Icon>;
        const Thermometer = ({ className }) => <Icon className={className}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></Icon>;
        const Wind = ({ className }) => <Icon className={className}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></Icon>;
        const Zap = ({ className }) => <Icon className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const CheckCircle2 = ({ className }) => <Icon className={className}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></Icon>;
        const FileText = ({ className }) => <Icon className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></Icon>;
        const Settings2 = ({ className }) => <Icon className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="7" r="3"/><circle cx="8" cy="17" r="3"/></Icon>;
        const Activity = ({ className }) => <Icon className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Icon>;
        const RotateCcw = ({ className }) => <Icon className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const Flame = ({ className }) => <Icon className={className}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
        const Monitor = ({ className }) => <Icon className={className}><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></Icon>;
        const Archive = ({ className }) => <Icon className={className}><polyline points="21 8 21 21 3 21 3 8"/><rect width="22" height="5" x="1" y="3" rx="1"/><line x1="10" x2="14" y1="12" y2="12"/></Icon>;
        const Trash2 = ({ className }) => <Icon className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Icon>;
        const CopyPlus = ({ className }) => <Icon className={className}><line x1="15" x2="15" y1="12" y2="18"/><line x1="12" x2="18" y1="15" y2="15"/><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></Icon>;

        // --- HOISTED UI COMPONENTS ---
        const NumInput = ({ label, name, placeholder, unit, unitType = 'raw', disabled, value, onChangeText, isMetric, isNonOp }) => {
            const [localVal, setLocalVal] = useState('');

            // Synchronize with immutable base state, formatting only for display
            useEffect(() => {
                if (value === '' || value === undefined) {
                    setLocalVal('');
                    return;
                }
                const n = parseFloat(value);
                if (isNaN(n)) return;

                if (!isMetric || unitType === 'raw') {
                    setLocalVal(n.toString());
                } else {
                    let conv = n;
                    if (unitType === 'temp') conv = (n - 32) * 5/9;
                    else if (unitType === 'pressure') conv = n * 6.89476;
                    else if (unitType === 'static') conv = n * 0.249089;
                    else if (unitType === 'weight') conv = n * 28.3495;
                    else if (unitType === 'length') conv = n * 0.3048;
                    
                    const dec = unitType === 'static' ? 2 : 1;
                    const currentLocal = parseFloat(localVal);
                    if (isNaN(currentLocal) || Math.abs(currentLocal - conv) > 0.05) {
                        setLocalVal(conv.toFixed(dec));
                    }
                }
            }, [value, isMetric, unitType]);

            const handleLocalChange = (e) => {
                const raw = e.target.value;
                setLocalVal(raw);
                
                const n = parseFloat(raw);
                if (isNaN(n) || raw.endsWith('.')) {
                    if (raw === '') onChangeText(name, '');
                    return;
                }

                let imp = n;
                // Reverse-calculate metric input back to base imperial ledger
                if (isMetric && unitType !== 'raw') {
                    if (unitType === 'temp') imp = (n * 9/5) + 32;
                    else if (unitType === 'pressure') imp = n / 6.89476;
                    else if (unitType === 'static') imp = n / 0.249089;
                    else if (unitType === 'weight') imp = n / 28.3495;
                    else if (unitType === 'length') imp = n / 0.3048;
                }
                onChangeText(name, Number(Math.round(imp + 'e4') + 'e-4').toString());
            };

            const isEmpty = value === '' || value === undefined;
            const isReading = ['returnTemp', 'supplyTemp', 'compressorAmps', 'compressorAmps2', 'fanAmps', 'blowerAmps'].includes(name);
            const showWarning = !disabled && isEmpty && (!isReading || !isNonOp);

            return (
                <div className={`flex flex-col mb-3 ${disabled ? 'opacity-50 grayscale-[50%]' : ''}`}>
                    <label className="text-xs font-semibold text-gray-600 mb-1">{label}</label>
                    <div className="relative">
                        <input
                            type="number"
                            inputMode="decimal"
                            step="any"
                            name={name}
                            value={localVal}
                            onChange={handleLocalChange}
                            placeholder={placeholder}
                            disabled={disabled}
                            className={`w-full pl-3 pr-12 py-2 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed ${showWarning ? 'border-red-300 shadow-sm' : 'border-gray-200'}`}
                        />
                        {unit && <span className="absolute right-3 top-2 text-gray-400 text-[10px]">{unit}</span>}
                    </div>
                </div>
            );
        };

        const CapacitorCheck = ({ rated, actual }) => {
            const r = parseFloat(rated);
            const a = parseFloat(actual);
            if (isNaN(r) || isNaN(a) || r === 0) return null;
            const variance = ((a - r) / r) * 100;
            const failed = Math.abs(variance) > 6;
            return (
                <div className={`text-[10px] font-bold mt-1 tracking-wider ${failed ? 'text-red-600' : 'text-emerald-600'}`}>
                    {variance > 0 ? '+' : ''}{variance.toFixed(1)}% Deviation {failed && ' (OUT OF TOLERANCE)'}
                </div>
            );
        };

        const TextInput = ({ label, name, placeholder, disabled, value, onChangeText }) => {
            const isEmpty = value === '' || value === undefined;
            const showWarning = !disabled && isEmpty;
            return (
                <div className={`flex flex-col mb-3 ${disabled ? 'opacity-50 grayscale-[50%]' : ''}`}>
                    <label className="text-xs font-semibold text-gray-600 mb-1">{label}</label>
                    <input
                        type="text"
                        name={name}
                        value={value || ''}
                        onChange={(e) => onChangeText(name, e.target.value)}
                        placeholder={placeholder}
                        disabled={disabled}
                        className={`w-full px-3 py-2 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed ${showWarning ? 'border-red-300 shadow-sm' : 'border-gray-200'}`}
                    />
                </div>
            );
        };

        const SelectInput = ({ label, name, options, disabled, value, onChangeText }) => {
            const isEmpty = value === '' || value === undefined;
            return (
                <div className={`flex flex-col mb-3 ${disabled ? 'opacity-50 grayscale-[50%]' : ''}`}>
                    <label className="text-xs font-semibold text-gray-600 mb-1">{label}</label>
                    <select
                        name={name}
                        value={value || ''}
                        onChange={(e) => onChangeText(name, e.target.value)}
                        disabled={disabled}
                        className={`w-full px-3 py-2 bg-gray-50 border rounded-lg focus:ring-2 focus:ring-blue-500 transition-all text-sm outline-none disabled:bg-gray-100 disabled:text-gray-400 disabled:cursor-not-allowed ${!disabled && isEmpty ? 'border-red-400 text-red-600 font-bold' : 'border-gray-200 text-gray-800'}`}
                    >
                        <option value="">(SELECT)</option>
                        {options.map(opt => <option key={opt.val} value={opt.val} className="text-gray-800 font-normal">{opt.label}</option>)}
                    </select>
                </div>
            );
        };

        const InlineSelect = ({ name, value, children, disabled, onChangeText }) => {
            const isEmpty = value === '' || value === undefined;
            return (
                <select 
                    name={name} 
                    value={value || ''} 
                    onChange={(e) => onChangeText(name, e.target.value)} 
                    disabled={disabled}
                    className={`w-full px-3 py-2 bg-gray-50 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 ${!disabled && isEmpty ? 'border-red-400 text-red-600 font-bold' : 'border-gray-200 text-gray-800 font-medium'}`}
                >
                    {children}
                </select>
            );
        };

        // --- APP LOGIC ---
        const BASE_INITIAL_STATE = {
            jobName: '', outdoorModel: '', outdoorSerial: '', indoorModel: '', indoorSerial: '', tonnageRating: '',
            outdoorUnitType: '', packageUnitType: '', indoorUnitType: '', 
            heatingType: '', operationalMode: '', refrigerant: '', 
            customRefrigerant: '', meteringDevice: '', returnTemp: '', supplyTemp: '', returnWetBulb: '', supplyWetBulb: '',
            supplyStatic: '', returnStatic: '',
            
            // Topology counts
            numberOfCompressors: '1', numberOfCircuits: '1',
            
            outdoorAmbient: '', 
            suctionSatTemp: '', suctionLineTemp: '', liquidSatTemp: '', liquidLineTemp: '', dischargeSatTemp: '', dischargeLineTemp: '', 
            suctionSatTemp2: '', suctionLineTemp2: '', liquidSatTemp2: '', liquidLineTemp2: '', dischargeSatTemp2: '', dischargeLineTemp2: '',
            
            compressorAmps: '', compressorAmps2: '', fanAmps: '', blowerAmps: '', 
            outdoorPhase: '1', outdoorVoltageL1L2: '', outdoorVoltageL1L3: '', outdoorVoltageL2L3: '', outdoorVoltageL1GND: '', outdoorVoltageL2GND: '', outdoorVoltageL3GND: '', 
            indoorPhase: '1', indoorVoltageL1L2: '', indoorVoltageL1L3: '', indoorVoltageL2L3: '', indoorVoltageL1GND: '', indoorVoltageL2GND: '', indoorVoltageL3GND: '', 
            controlVoltage: '', heaterKitAmps: '', heaterKitVoltage: '',
            inletGasStatic: '', inletGasLoad: '', manifoldPressure: '',
            inducerAmps: '', inducedDraftPressure: '', pressureSwitchPoint: '',
            
            msOutdoorSize: '', msHeadCount: '0', 
            msBaseCharge: '', msPrechargeLength: '', msTotalWeighedCharge: '', msRecoveredCharge: '',
            msHeads: Array.from({length: 5}, () => ({ type: '', size: '', model: '', serial: '', voltageS2S3: '', returnTemp: '', supplyTemp: '', hasDiagnostics: false, errorCode: '', setpoint: '', roomTemp: '', customName: '', flareLeak: '', blowerWheel: '', drainTest: '', liquidLineSize: '1/4', lineLength: '' })),
            msIndoorError: '', msOutdoorError: '', msSetpoint: '', msRoomTemp: '',
            
            indoorCapRated: '', indoorCapActual: '', indoorECM: false, 
            oduCapType: '', oduCapHermRated: '', oduCapHermActual: '', oduCapFanRated: '', oduCapFanActual: '', oduFanECM: false, oduCapCompRated: '', oduCapCompActual: '',
            oduCapType2: '', oduCapHermRated2: '', oduCapHermActual2: '', oduCapFanRated2: '', oduCapFanActual2: '', oduFanECM2: false, oduCapCompRated2: '', oduCapCompActual2: '',
            notes: ''
        };

        const createNewJob = () => ({
            id: Date.now().toString() + Math.random().toString(36).substring(2, 9),
            createdAt: new Date().toISOString(),
            lastModified: new Date().toISOString(),
            ...BASE_INITIAL_STATE
        });

        const HvacTroubleshooter = () => {
            const [activeTab, setActiveTab] = useState('data');
            const [exportFormat, setExportFormat] = useState('text');
            const [copied, setCopied] = useState(false);
            const [showConfirmReset, setShowConfirmReset] = useState(false);
            const [isMetric, setIsMetric] = useState(false);

            // Job Archive State
            const [savedJobs, setSavedJobs] = useState(() => {
                try {
                    const saved = localStorage.getItem('hvac-jobs-archive');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            // Active Job State
            const [data, setData] = useState(() => {
                try {
                    const activeId = localStorage.getItem('hvac-active-job');
                    if (activeId) {
                        const saved = localStorage.getItem('hvac-jobs-archive');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            const found = parsed.find(j => j.id === activeId);
                            if (found) return found;
                        }
                    }
                    return createNewJob();
                } catch (e) {
                    return createNewJob();
                }
            });

            // Dynamic Unit Variables
            const tempUnit = isMetric ? '°C' : '°F';
            const pressureUnit = isMetric ? ' kPa' : ' PSIG';
            const staticUnit = isMetric ? ' kPa' : ' in. w.c.';
            const weightUnit = isMetric ? 'g' : 'oz';
            const lengthUnit = isMetric ? 'm' : 'ft';

            // Boolean Helpers for UI Logic
            const isMiniSplit = data.outdoorUnitType === 'Mini-Split';
            const isPackageUnit = data.outdoorUnitType === 'Package Unit';
            const hasOutdoorUnit = data.outdoorUnitType !== '' && data.outdoorUnitType !== 'None';
            
            const isGasAvailable = (!isPackageUnit && !isMiniSplit && data.indoorUnitType === 'Gas Furnace') || (isPackageUnit && data.heatingType === 'Gas Heat');
            const isAuxAvailable = (!isPackageUnit && !isMiniSplit && data.indoorUnitType === 'Air Handler w/Heat Strips') || (isPackageUnit && data.heatingType === 'Electric Strip Heat');
            const isHeatPumpAvailable = data.outdoorUnitType === 'Heat Pump' || (isPackageUnit && data.packageUnitType === 'Heat Pump') || isMiniSplit;
            const isNonOp = data.operationalMode === 'Non-Operative';
            const hasAnyUnitSelected = hasOutdoorUnit || (!isPackageUnit && !isMiniSplit && data.indoorUnitType !== '');

            // Thermodynamic Visibility Logic
            const isCompressorActiveOrIdle = ['Cooling', 'Heating', 'Defrost', 'Non-Operative', ''].includes(data.operationalMode);
            const showRefrigerantDetails = hasOutdoorUnit;
            const showRefrigerantCircuit = hasOutdoorUnit && !['Gas Heat', 'Electric Strip Heat'].includes(data.operationalMode) && isCompressorActiveOrIdle;
            const showOutdoorElectrical = hasOutdoorUnit && isCompressorActiveOrIdle;

            const toggleUnits = () => {
                setIsMetric(!isMetric);
            };

            useEffect(() => {
                setSavedJobs(prev => {
                    const index = prev.findIndex(j => j.id === data.id);
                    let newJobs = [...prev];
                    if (index >= 0) {
                        newJobs[index] = data;
                    } else {
                        newJobs.unshift(data);
                    }
                    localStorage.setItem('hvac-jobs-archive', JSON.stringify(newJobs));
                    return newJobs;
                });
                localStorage.setItem('hvac-active-job', data.id);
            }, [data]);

            const handleReset = () => {
                setData(createNewJob());
                setShowConfirmReset(false);
                setActiveTab('data');
            };

            const handleForkJob = () => {
                const forkedData = {
                    ...data,
                    id: Date.now().toString() + Math.random().toString(36).substring(2, 9),
                    createdAt: new Date().toISOString(),
                    lastModified: new Date().toISOString(),
                    jobName: data.jobName ? `${data.jobName} (Visit 2)` : 'New Visit'
                };
                setData(forkedData);
                setActiveTab('data');
            };

            const loadJob = (job) => {
                setData(job);
                setActiveTab('data');
            };

            const deleteJob = (id) => {
                const updatedJobs = savedJobs.filter(j => j.id !== id);
                setSavedJobs(updatedJobs);
                localStorage.setItem('hvac-jobs-archive', JSON.stringify(updatedJobs));
                
                if (data.id === id) {
                    setData(updatedJobs.length > 0 ? updatedJobs[0] : createNewJob());
                }
            };

            const handleClearHeads = () => {
                setData(prev => ({
                    ...prev,
                    msHeads: Array.from({length: 5}, () => ({ type: '', size: '', model: '', serial: '', voltageS2S3: '', returnTemp: '', supplyTemp: '', hasDiagnostics: false, errorCode: '', setpoint: '', roomTemp: '', customName: '', flareLeak: '', blowerWheel: '', drainTest: '', liquidLineSize: '1/4', lineLength: '' }))
                }));
            };

            const handleStandardNumChange = (name, value) => {
                setData(prev => ({ 
                    ...prev, 
                    [name]: value,
                    lastModified: new Date().toISOString()
                }));
            };

            const handleCheckboxChange = (e) => {
                setData(prev => ({ ...prev, [e.target.name]: e.target.checked, lastModified: new Date().toISOString() }));
            };

            const handleHeadChange = (index, field, value) => {
                const newHeads = [...data.msHeads];
                newHeads[index][field] = value;
                setData(prev => ({ ...prev, msHeads: newHeads, lastModified: new Date().toISOString() }));
            };

            const metrics = useMemo(() => {
                const parse = (val) => (val === '' || val === undefined ? NaN : parseFloat(val));
                const rt = parse(data.returnTemp), st = parse(data.supplyTemp);
                const rs = parse(data.returnStatic), ss = parse(data.supplyStatic);

                let deltaT = NaN;
                const heatingModes = ['Heating', 'Gas Heat', 'Electric Strip Heat'];
                const validOperation = ['Cooling', ...heatingModes].includes(data.operationalMode);

                if (!isNaN(rt) && !isNaN(st) && validOperation) {
                    deltaT = heatingModes.includes(data.operationalMode) ? st - rt : rt - st;
                }

                let tesp = NaN;
                if (!isNaN(rs) && !isNaN(ss)) {
                    tesp = Math.abs(rs) + Math.abs(ss);
                }

                // Superheat and Subcooling for dynamic circuits
                const sst1 = parse(data.suctionSatTemp), slt1 = parse(data.suctionLineTemp);
                const lst1 = parse(data.liquidSatTemp), llt1 = parse(data.liquidLineTemp);
                const sst2 = parse(data.suctionSatTemp2), slt2 = parse(data.suctionLineTemp2);
                const lst2 = parse(data.liquidSatTemp2), llt2 = parse(data.liquidLineTemp2);

                let superheat = NaN, subcooling = NaN;
                if (!isNaN(slt1) && !isNaN(sst1)) superheat = slt1 - sst1;
                if (!isNaN(lst1) && !isNaN(llt1)) subcooling = lst1 - llt1;

                let superheat2 = NaN, subcooling2 = NaN;
                if (!isNaN(slt2) && !isNaN(sst2)) superheat2 = slt2 - sst2;
                if (!isNaN(lst2) && !isNaN(llt2)) subcooling2 = lst2 - llt2;

                let msCalculatedCharge = NaN;
                let msChargeDeviation = NaN;
                const bc = parse(data.msBaseCharge);
                const pl = parse(data.msPrechargeLength);

                if (!isNaN(bc)) {
                    let additionalCharge = 0;
                    data.msHeads.forEach(h => {
                        const len = parse(h.lineLength);
                        if (!isNaN(len)) {
                            const mult = h.liquidLineSize === '3/8' ? 0.58 : (h.liquidLineSize === '1/2' ? 1.14 : 0.22);
                            additionalCharge += (len * mult);
                        }
                    });
                    const prechargeDeduction = !isNaN(pl) ? (pl * 0.22) : 0;
                    additionalCharge -= prechargeDeduction;
                    msCalculatedCharge = Math.max(0, bc + additionalCharge);
                }

                const rc = parse(data.msRecoveredCharge);
                if (!isNaN(msCalculatedCharge) && !isNaN(rc)) {
                    msChargeDeviation = rc - msCalculatedCharge;
                }

                return { deltaT, tesp, superheat, subcooling, superheat2, subcooling2, msCalculatedCharge, msChargeDeviation };
            }, [data]);

            const getToleranceFlag = (rated, actual) => {
                const r = parseFloat(rated); const a = parseFloat(actual);
                if (isNaN(r) || isNaN(a) || r === 0) return '';
                return Math.abs(((a - r) / r) * 100) > 6 ? ' [OUT OF TOLERANCE]' : '';
            };

            const formatExportValue = (val, unitType, unitSuffix) => {
                if (val === '' || val === undefined || isNaN(parseFloat(val))) return 'N/A';
                const n = parseFloat(val);
                let res = n;
                
                if (isMetric && unitType !== 'raw') {
                    if (unitType === 'temp') res = (n - 32) * 5/9;
                    else if (unitType === 'pressure') res = n * 6.89476;
                    else if (unitType === 'static') res = n * 0.249089;
                    else if (unitType === 'weight') res = n * 28.3495;
                    else if (unitType === 'length') res = n * 0.3048;
                }
                
                let dec = 1;
                if (unitType === 'static') dec = 2;
                if (unitType === 'raw') dec = Number.isInteger(res) ? 0 : 1;
                
                return `${res.toFixed(dec)}${unitSuffix}`;
            };

            const generateExportContent = () => {
                const m = metrics;
                const sel = (val) => val === '' || val === undefined ? 'Not Selected' : val;
                const isHeatingRefrigerant = data.operationalMode === 'Heating';

                if (exportFormat === 'json') {
                    return JSON.stringify({
                        metadata: { id: data.id, createdAt: data.createdAt, lastModified: data.lastModified, exportDate: new Date().toISOString() },
                        systemData: data, calculatedMetrics: m
                    }, null, 2);
                }

                let text = '';
                
                if (exportFormat === 'markdown') {
                    text += `## 📋 HVAC SYSTEM DATA COLLECTION\n\n`;
                    text += `**Date:** ${new Date().toLocaleDateString()}\n`;
                    text += `**Job/Customer:** ${data.jobName || 'Unspecified'}\n`;
                    text += `**Outdoor Unit:** ${sel(data.outdoorUnitType)}\n`;

                    if (hasOutdoorUnit) {
                        text += `**${isPackageUnit ? 'Package' : 'Outdoor'} Model:** ${data.outdoorModel || 'N/A'}\n`;
                        text += `**${isPackageUnit ? 'Package' : 'Outdoor'} Serial:** ${data.outdoorSerial || 'N/A'}\n`;
                    }

                    if (isPackageUnit) {
                        text += `**Package Type:** ${sel(data.packageUnitType)}\n**Heating Type:** ${sel(data.heatingType)}\n**Tonnage Rating:** ${data.tonnageRating || 'N/A'}\n`;
                    } else if (isMiniSplit) {
                        text += `**Outdoor Size:** ${data.msOutdoorSize || 'N/A'}\n**Heads Configured:** ${data.msHeadCount}\n`;
                    } else {

                        }
                        if (isAuxAvailable) {
                            text += `- Aux Heat: ${formatExportValue(data.heaterKitAmps, 'raw', 'A')} @ ${formatExportValue(data.heaterKitVoltage, 'raw', 'V')}\n`;
                        }
                    } else {
                        if (hasOutdoorUnit) {
                            text += `Outdoor Electrical\n`;
                            if (data.outdoorPhase === '3') {
                                text += `- Voltage (L-L): L1-L2: ${formatExportValue(data.outdoorVoltageL1L2, 'raw', 'V')} | L1-L3: ${formatExportValue(data.outdoorVoltageL1L3, 'raw', 'V')} | L2-L3: ${formatExportValue(data.outdoorVoltageL2L3, 'raw', 'V')}\n`;
                                text += `- Voltage (L-G): L1-GND: ${formatExportValue(data.outdoorVoltageL1GND, 'raw', 'V')} | L2-GND: ${formatExportValue(data.outdoorVoltageL2GND, 'raw', 'V')} | L3-GND: ${formatExportValue(data.outdoorVoltageL3GND, 'raw', 'V')}\n`;
                            } else {
                                text += `- Voltage: L1-L2: ${formatExportValue(data.outdoorVoltageL1L2, 'raw', 'V')} | L1-GND: ${formatExportValue(data.outdoorVoltageL1GND, 'raw', 'V')} | L2-GND: ${formatExportValue(data.outdoorVoltageL2GND, 'raw', 'V')}\n`;
                            }
                            if (showOutdoorElectrical) {
                                const comps = parseInt(data.numberOfCompressors) || 1;
                                for (let i = 1; i <= comps; i++) {
                                    const s = i === 1 ? '' : '2';
                                    text += `- Motors: Comp ${comps > 1 ? i + ' ' : ''}Amps: ${formatExportValue(data[`compressorAmps${s}`], 'raw', 'A')}\n`;
                                }
                                text += `- Motors: OD Fan Amps: ${formatExportValue(data.fanAmps, 'raw', 'A')}\n`;
                            }
                            const comps = parseInt(data.numberOfCompressors) || 1;
                            for (let i = 1; i <= comps; i++) {
                                const s = i === 1 ? '' : '2';
                                const cType = data[`oduCapType${s}`];
                                if (cType === 'Dual') {
                                    text += `- ODU Dual Cap${comps > 1 ? ` (Comp ${i})` : ''}: Herm: Rated: ${formatExportValue(data[`oduCapHermRated${s}`], 'raw', ' µF')} / Actual: ${formatExportValue(data[`oduCapHermActual${s}`], 'raw', ' µF')}${getToleranceFlag(data[`oduCapHermRated${s}`], data[`oduCapHermActual${s}`])} | Fan: Rated: ${formatExportValue(data[`oduCapFanRated${s}`], 'raw', ' µF')} / Actual: ${formatExportValue(data[`oduCapFanActual${s}`], 'raw', ' µF')}${getToleranceFlag(data[`oduCapFanRated${s}`], data[`oduCapFanActual${s}`])}\n`;
                                } else if (cType === 'Single') {
                                    text += `- ODU Comp Cap${comps > 1 ? ` (Comp ${i})` : ''}: Rated: ${formatExportValue(data[`oduCapCompRated${s}`], 'raw', ' µF')} / Actual: ${formatExportValue(data[`oduCapCompActual${s}`], 'raw', ' µF')}${getToleranceFlag(data[`oduCapCompRated${s}`], data[`oduCapCompActual${s}`])}\n`;
                                    text += `- ODU Fan Cap${comps > 1 ? ` (Comp ${i})` : ''}: ${data[`oduFanECM${s}`] ? 'ECM Motor (No Cap)' : `Rated: ${formatExportValue(data[`oduCapFanRated${s}`], 'raw', ' µF')} / Actual: ${formatExportValue(data[`oduCapFanActual${s}`], 'raw', ' µF')}${getToleranceFlag(data[`oduCapFanRated${s}`], data[`oduCapFanActual${s}`])}`}\n`;
                                }
                            }
                        }
                        
                        if (!isPackageUnit && data.indoorUnitType !== '') {
                            if (hasOutdoorUnit) text += `\n`;
                            text += `Indoor Electrical\n`;
                            if (data.indoorPhase === '3') {
                                text += `- Voltage (L-L): L1-L2: ${formatExportValue(data.indoorVoltageL1L2, 'raw', 'V')} | L1-L3: ${formatExportValue(data.indoorVoltageL1L3, 'raw', 'V')} | L2-L3: ${formatExportValue(data.indoorVoltageL2L3, 'raw', 'V')}\n`;
                                text += `- Voltage (L-G): L1-GND: ${formatExportValue(data.indoorVoltageL1GND, 'raw', 'V')} | L2-GND: ${formatExportValue(data.indoorVoltageL2GND, 'raw', 'V')} | L3-GND: ${formatExportValue(data.indoorVoltageL3GND, 'raw', 'V')}\n`;
                            } else {
                                text += `- Voltage: L1-L2/N: ${formatExportValue(data.indoorVoltageL1L2, 'raw', 'V')} | L1-GND: ${formatExportValue(data.indoorVoltageL1GND, 'raw', 'V')} | L2/N-GND: ${formatExportValue(data.indoorVoltageL2GND, 'raw', 'V')}\n`;
                            }
                            text += `- Control Voltage: ${formatExportValue(data.controlVoltage, 'raw', 'V')}\n`;
                            text += `- Motors: ID Blower: ${formatExportValue(data.blowerAmps, 'raw', 'A')}\n`;
                            text += `- Indoor Cap: ${data.indoorECM ? 'ECM Motor (No Cap)' : `Rated: ${formatExportValue(data.indoorCapRated, 'raw', ' µF')} / Actual: ${formatExportValue(data.indoorCapActual, 'raw', ' µF')}${getToleranceFlag(data.indoorCapRated, data.indoorCapActual)}`}\n`;
                            if (isAuxAvailable) {
                                text += `- Aux Heat: ${formatExportValue(data.heaterKitAmps, 'raw', 'A')} @ ${formatExportValue(data.heaterKitVoltage, 'raw', 'V')}\n`;
                            }
                        }
                    }
                }

                text += `\n\nADDITIONAL NOTES\n${data.notes || 'None'}`;

                return text;
            };

            const handleCopy = () => {
                const text = generateExportContent();
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }).catch(err => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            };

            const fallbackCopy = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Copy failed', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="min-h-screen font-sans text-gray-800 pb-8 sm:pb-0">
                    <div className="max-w-3xl mx-auto bg-white sm:rounded-2xl sm:shadow-xl overflow-hidden relative sm:my-4 flex flex-col min-h-[90vh]">
                        
                        {/* Reset Confirmation Modal */}
                        {showConfirmReset && (
                            <div className="absolute inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
                                <div className="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl">
                                    <h3 className="text-lg font-bold text-gray-900 mb-2">Clear Form?</h3>
                                    <p className="text-sm text-gray-600 mb-6">Are you sure you want to start a new job? This will erase all currently entered data.</p>
                                    <div className="flex gap-3 justify-end">
                                        <button onClick={() => setShowConfirmReset(false)} className="px-4 py-2 rounded-lg font-medium text-gray-600 hover:bg-gray-100 transition-colors">Cancel</button>
                                        <button onClick={handleReset} className="px-4 py-2 rounded-lg font-medium text-white bg-red-600 hover:bg-red-700 transition-colors">Clear Data</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Header */}
                        <div className="bg-slate-800 text-white p-4 sm:p-6 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <Activity className="w-6 h-6 text-blue-400" />
                                <h1 className="text-lg sm:text-xl font-bold tracking-wide">HVAC Data Collector</h1>
                            </div>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={toggleUnits}
                                    className="text-[10px] font-bold bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg transition-colors border border-slate-600 tracking-widest uppercase"
                                >
                                    {isMetric ? 'Metric' : 'Imperial'}
                                </button>
                                <button 
                                    onClick={handleForkJob}
                                    className="flex items-center gap-2 text-sm font-medium bg-slate-700 hover:bg-slate-600 text-blue-300 px-3 py-1.5 rounded-lg transition-colors shadow-sm"
                                    title="Fork Visit (Preserve Baseline)"
                                >
                                    <CopyPlus className="w-4 h-4" /> <span className="hidden sm:inline">Fork Visit</span>
                                </button>
                                <button 
                                    onClick={() => setShowConfirmReset(true)}
                                    className="flex items-center gap-2 text-sm font-medium bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded-lg transition-colors shadow-sm"
                                >
                                    <RotateCcw className="w-4 h-4" /> <span className="hidden sm:inline">New Job</span>
                                </button>
                            </div>
                        </div>

                        {/* Navigation */}
                        <div className="flex border-b border-gray-200 bg-gray-50">
                            <button 
                                onClick={() => setActiveTab('data')}
                                className={`flex-1 py-3 px-2 sm:px-4 text-xs sm:text-sm font-medium flex items-center justify-center gap-2 border-b-2 transition-colors ${activeTab === 'data' ? 'border-blue-500 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                            >
                                <Settings2 className="w-4 h-4" /> <span className="hidden sm:inline">Data Entry</span>
                            </button>
                            <button 
                                onClick={() => setActiveTab('export')}
                                className={`flex-1 py-3 px-2 sm:px-4 text-xs sm:text-sm font-medium flex items-center justify-center gap-2 border-b-2 transition-colors ${activeTab === 'export' ? 'border-blue-500 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                            >
                                <FileText className="w-4 h-4" /> <span className="hidden sm:inline">Export</span>
                            </button>
                            <button 
                                onClick={() => setActiveTab('history')}
                                className={`flex-1 py-3 px-2 sm:px-4 text-xs sm:text-sm font-medium flex items-center justify-center gap-2 border-b-2 transition-colors ${activeTab === 'history' ? 'border-blue-500 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                            >
                                <Archive className="w-4 h-4" /> <span className="hidden sm:inline">History</span>
                            </button>
                        </div>

                        <div className="p-4 sm:p-6 flex-1 overflow-auto">
                            
                            {/* TAB 1: DATA ENTRY */}
                            {activeTab === 'data' && (
                                <div className="space-y-6">
                                    <section className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
                                        <h2 className="text-sm font-bold text-gray-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                                            <ClipboardCopy className="w-4 h-4 text-gray-400" /> System Details
                                        </h2>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <TextInput label="Customer / Job Name" name="jobName" placeholder="e.g. Smith Residence" value={data.jobName} onChangeText={handleStandardNumChange} />
                                            <TextInput label="Model Number" name="modelNumber" placeholder="e.g. GSXC18..." value={data.modelNumber} onChangeText={handleStandardNumChange} />
                                            <TextInput label="Serial Number" name="serialNumber" placeholder="e.g. 1912..." value={data.serialNumber} onChangeText={handleStandardNumChange} />
                                            
                                            <div className="flex flex-col">
                                                <label className="text-xs font-semibold text-gray-600 mb-1">Outdoor Unit</label>
                                                <InlineSelect name="outdoorUnitType" value={data.outdoorUnitType} onChangeText={handleStandardNumChange}>
                                                    <option value="">(MAKE A SELECTION)</option>
                                                    <option value="Air Conditioner" className="text-gray-800 font-normal">Air Conditioner</option>
                                                    <option value="Heat Pump" className="text-gray-800 font-normal">Heat Pump</option>
                                                    <option value="Package Unit" className="text-gray-800 font-normal">Package Unit</option>
                                                    <option value="Mini-Split" className="text-gray-800 font-normal">Mini-Split</option>
                                                    <option value="None" className="text-gray-800 font-normal">None</option>
                                                </InlineSelect>
                                            </div>

                                            {hasOutdoorUnit && !isMiniSplit && (
                                                <div className="flex flex-col animate-in fade-in duration-300">
                                                    <label className="text-xs font-semibold text-gray-600 mb-1">Tonnage Rating</label>
                                                    <InlineSelect name="tonnageRating" value={data.tonnageRating} onChangeText={handleStandardNumChange}>
                                                        <option value="">(SELECT TONNAGE)</option>
                                                        <option value="1.5 Ton" className="text-gray-800 font-normal">1.5 Ton</option>
                                                        <option value="2.0 Ton" className="text-gray-800 font-normal">2.0 Ton</option>
                                                        <option value="2.5 Ton" className="text-gray-800 font-normal">2.5 Ton</option>
                                                        <option value="3.0 Ton" className="text-gray-800 font-normal">3.0 Ton</option>
                                                        <option value="3.5 Ton" className="text-gray-800 font-normal">3.5 Ton</option>
                                                        <option value="4.0 Ton" className="text-gray-800 font-normal">4.0 Ton</option>
                                                        <option value="5.0 Ton" className="text-gray-800 font-normal">5.0 Ton</option>
                                                    </InlineSelect>
                                                </div>
                                            )}

                                            {hasOutdoorUnit && !isMiniSplit && (
                                                <>
                                                    <div className="flex flex-col animate-in fade-in duration-300">
                                                        <label className="text-xs font-semibold text-gray-600 mb-1">Number of Compressors</label>
                                                        <InlineSelect name="numberOfCompressors" value={data.numberOfCompressors} onChangeText={handleStandardNumChange}>
                                                            <option value="1">1</option>
                                                            <option value="2">2</option>
                                                        </InlineSelect>
                                                    </div>
                                                    <div className="flex flex-col animate-in fade-in duration-300">
                                                        <label className="text-xs font-semibold text-gray-600 mb-1">Number of Circuits</label>
                                                        <InlineSelect name="numberOfCircuits" value={data.numberOfCircuits} onChangeText={handleStandardNumChange}>
                                                            <option value="1">1</option>
                                                            <option value="2">2</option>
                                                        </InlineSelect>
                                                    </div>
                                                </>
                                            )}

                                            {isPackageUnit ? (
                                                <>
                                                    <div className="flex flex-col">
                                                        <label className="text-xs font-semibold text-gray-600 mb-1">Package Unit Type</label>
                                                        <InlineSelect name="packageUnitType" value={data.packageUnitType} onChangeText={handleStandardNumChange}>
                                                            <option value="">(MAKE A SELECTION)</option>
                                                            <option value="Air Conditioner" className="text-gray-800 font-normal">Air Conditioner</option>
                                                            <option value="Heat Pump" className="text-gray-800 font-normal">Heat Pump</option>
                                                        </InlineSelect>
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <label className="text-xs font-semibold text-gray-600 mb-1">Heating Type</label>
                                                        <InlineSelect name="heatingType" value={data.heatingType} onChangeText={handleStandardNumChange}>
                                                            <option value="">(MAKE A SELECTION)</option>
                                                            <option value="Gas Heat" className="text-gray-800 font-normal">Gas Heat</option>
                                                            <option value="Electric Strip Heat" className="text-gray-800 font-normal">Electric Strip Heat</option>
                                                            {data.packageUnitType === 'Heat Pump' ? (
                                                                <option value="Heat Pump Only" className="text-gray-800 font-normal">Heat Pump Only</option>
                                                            ) : data.packageUnitType === 'Air Conditioner' ? (
                                                                <option value="Air Conditioner Only" className="text-gray-800 font-normal">Air Conditioner Only</option>
                                                            ) : (
                                                                <option value="None" className="text-gray-800 font-normal">None</option>
                                                            )}
                                                        </InlineSelect>
                                                    </div>
                                                </>
                                            ) : isMiniSplit ? (
                                                <>
                                                    <TextInput label="Outdoor Unit Size" name="msOutdoorSize" placeholder="e.g. 36k / 3 Ton" value={data.msOutdoorSize} onChangeText={handleStandardNumChange} />
                                                    <div className="flex flex-col">
                                                        <label className="text-xs font-semibold text-gray-600 mb-1">Number of Heads</label>
                                                        <InlineSelect name="msHeadCount" value={data.msHeadCount} onChangeText={handleStandardNumChange}>
                                                            <option value="0" className="text-gray-800 font-normal">0</option>
                                                            <option value="1" className="text-gray-800 font-normal">1</option>
                                                            <option value="2" className="text-gray-800 font-normal">2</option>
                                                            <option value="3" className="text-gray-800 font-normal">3</option>
                                                            <option value="4" className="text-gray-800 font-normal">4</option>
                                                            <option value="5" className="text-gray-800 font-normal">5</option>
                                                        </InlineSelect>
                                                    </div>
                                                </>
                                            ) : (
                                                <div className="flex flex-col">
                                                    <label className="text-xs font-semibold text-gray-600 mb-1">Indoor Unit</label>
                                                    <InlineSelect name="indoorUnitType" value={data.indoorUnitType} onChangeText={handleStandardNumChange}>
                                                        <option value="">(MAKE A SELECTION)</option>
                                                        <option value="Gas Furnace" className="text-gray-800 font-normal">Gas Furnace</option>
                                                        <option value="Air Handler" className="text-gray-800 font-normal">Air Handler</option>
                                                        <option value="Air Handler w/Heat Strips" className="text-gray-800 font-normal">Air Handler w/Heat Strips</option>
                                                    </InlineSelect>
                                                </div>
                                            )}

                                            <div className="flex flex-col">
                                                <label className="text-xs font-semibold text-gray-600 mb-1">Operational Mode</label>
                                                <InlineSelect name="operationalMode" value={data.operationalMode} onChangeText={handleStandardNumChange}>
                                                    <option value="">(MAKE A SELECTION)</option>
                                                    <option value="Cooling" className="text-gray-800 font-normal">Cooling</option>
                                                    {isHeatPumpAvailable && <option value="Heating" className="text-gray-800 font-normal">Heating (Heat Pump)</option>}
                                                    {isGasAvailable && <option value="Gas Heat" className="text-gray-800 font-normal">Gas Heat</option>}
                                                    {isAuxAvailable && <option value="Electric Strip Heat" className="text-gray-800 font-normal">Electric Strip Heat</option>}
                                                    {isHeatPumpAvailable && <option value="Defrost" className="text-gray-800 font-normal">Defrost</option>}
                                                    <option value="Fan Only" className="text-gray-800 font-normal">Fan Only</option>
                                                    <option value="Off" className="text-gray-800 font-normal">Off / Static</option>
                                                    <option value="Non-Operative" className="text-gray-800 font-normal">Non-Operative</option>
                                                </InlineSelect>
                                            </div>

                                            {showRefrigerantDetails && (
                                                <>
                                                    <div className="flex flex-col">
                                                        <label className="text-xs font-semibold text-gray-600 mb-1">Refrigerant</label>
                                                        <InlineSelect name="refrigerant" value={data.refrigerant} onChangeText={handleStandardNumChange}>
                                                            <option value="">(MAKE A SELECTION)</option>
                                                            <option value="R-410A" className="text-gray-800 font-normal">R-410A</option>
                                                            <option value="R-22" className="text-gray-800 font-normal">R-22</option>
                                                            <option value="R-32" className="text-gray-800 font-normal">R-32</option>
                                                            <option value="R-454B" className="text-gray-800 font-normal">R-454B</option>
                                                            <option value="Other" className="text-gray-800 font-normal">Other (Specify)</option>
                                                        </InlineSelect>
                                                    </div>
                                                    {data.refrigerant === 'Other' && (
                                                        <div className="flex flex-col">
                                                            <TextInput label="Specify Refrigerant" name="customRefrigerant" placeholder="e.g. R-134a" value={data.customRefrigerant} onChangeText={handleStandardNumChange} />
                                                        </div>
                                                    )}
                                                    {!isMiniSplit && (
                                                        <div className="flex flex-col">
                                                            <label className="text-xs font-semibold text-gray-600 mb-1">Metering Device</label>
                                                            <InlineSelect name="meteringDevice" value={data.meteringDevice} onChangeText={handleStandardNumChange}>
                                                                <option value="">(MAKE A SELECTION)</option>
                                                                <option value="TXV" className="text-gray-800 font-normal">TXV</option>
                                                                <option value="EEV" className="text-gray-800 font-normal">EEV</option>
                                                                <option value="Piston" className="text-gray-800 font-normal">Piston / Fixed Orifice</option>
                                                            </InlineSelect>
                                                        </div>
                                                    )}
                                                </>
                                            )}
                                        </div>

                                        {/* Dynamic Heads Section */}
                                        {isMiniSplit && parseInt(data.msHeadCount) > 0 && (
                                            <div className="mt-4 pt-4 border-t border-gray-100">
                                                <div className="flex items-center justify-between mb-4">
                                                    <h3 className="text-xs font-bold text-blue-600 uppercase">Indoor Unit Head Configuration & Performance</h3>
                                                    <button onClick={handleClearHeads} className="text-[10px] font-bold text-red-500 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors uppercase">Clear Zones</button>
                                                </div>
                                                <div className="space-y-6">
                                                    {Array.from({length: parseInt(data.msHeadCount)}).map((_, i) => (
                                                        <div key={i} className="p-4 bg-blue-50/30 rounded-xl border border-blue-100 space-y-3 shadow-sm">
                                                            <div className="flex items-center justify-between border-b border-blue-100/50 pb-2 mb-2">
                                                                <div className="flex items-center gap-3 flex-1 pr-4">
                                                                    <span className="text-[10px] font-black text-blue-500 uppercase tracking-widest whitespace-nowrap">Head {String.fromCharCode(65 + i)}</span>
                                                                    <input 
                                                                        type="text" 
                                                                        placeholder="Location (e.g. Master Bedroom)" 
                                                                        value={data.msHeads[i].customName || ''}
                                                                        onChange={(e) => handleHeadChange(i, 'customName', e.target.value)}
                                                                        disabled={isNonOp}
                                                                        className={`w-full px-2 py-1 bg-white/60 border border-blue-100 rounded text-[10px] outline-none focus:ring-1 focus:ring-blue-500 placeholder-gray-400 ${isNonOp ? 'opacity-50' : ''}`}
                                                                    />
                                                                </div>
                                                                <label className="flex items-center gap-1.5 cursor-pointer shrink-0">
                                                                    <input type="checkbox" checked={data.msHeads[i].hasDiagnostics || false} onChange={(e) => handleHeadChange(i, 'hasDiagnostics', e.target.checked)} disabled={isNonOp} className="w-3.5 h-3.5 accent-blue-600" />
                                                                    <span className="text-[9px] font-bold text-gray-500 uppercase tracking-wider">Log Error / Diag</span>
                                                                </label>
                                                            </div>
                                                            <div className="grid grid-cols-2 gap-3">
                                                                <div className="flex flex-col">
                                                                    <label className="text-[10px] font-bold text-gray-500 uppercase">Type</label>
                                                                    <select 
                                                                        value={data.msHeads[i].type} 
                                                                        onChange={(e) => handleHeadChange(i, 'type', e.target.value)}
                                                                        className={`w-full px-2 py-1.5 bg-white border rounded text-xs outline-none ${data.msHeads[i].type === '' ? 'border-red-400 text-red-600 font-bold' : 'border-gray-200 text-gray-800'}`}
                                                                    >
                                                                        <option value="">(SELECT)</option>
                                                                        <option value="Wall Mount" className="text-gray-800 font-normal">Wall Mount</option>
                                                                        <option value="Ceiling Cassette" className="text-gray-800 font-normal">Ceiling Cassette</option>
                                                                        <option value="Floor Mount" className="text-gray-800 font-normal">Floor Mount</option>
                                                                        <option value="Concealed Ducted" className="text-gray-800 font-normal">Concealed Ducted</option>
                                                                    </select>
                                                                </div>
                                                                <div className="flex flex-col">
                                                                    <label className="text-[10px] font-bold text-gray-500 uppercase">Size</label>
                                                                    <input 
                                                                        type="text" 
                                                                        placeholder="e.g. 9k / 12k"
                                                                        value={data.msHeads[i].size}
                                                                        onChange={(e) => handleHeadChange(i, 'size', e.target.value)}
